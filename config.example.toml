[boat]
boat_id = "my-boat"
device_id = "raspberry-pi-bridge"

[server]
url = "http://localhost:3000/api/heartbeat"
request_timeout_seconds = 8
payload_format = "compact"

[heartbeat]
interval_seconds = 30

[storage]
spool_db_path = "./spool.db"

[sensors]
mock_sensors = true

[sim7600]
enabled = false
port = "/dev/ttyUSB2"
baudrate = 115200
timeout_seconds = 2
enable_gnss = true
max_attempts = 2
retry_delay_seconds = 1
